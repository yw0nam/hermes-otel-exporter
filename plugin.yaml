name: hermes-otel-exporter
version: "0.1.0"
description: "Exports Hermes session/LLM/tool metrics and logs to the local OTel Collector (Prometheus + Loki + Grafana stack). Opt-in via `hermes plugins enable hermes-otel-exporter`."
author: spow12
requires_env: []
provides_hooks:
  - on_session_start
  - on_session_end
  - pre_llm_call
  - post_llm_call
  - pre_api_request
  - post_api_request
  - pre_tool_call
  - post_tool_call
  - transform_tool_result
  - pre_approval_request
  - post_approval_response
  - pre_gateway_dispatch
  - subagent_stop
